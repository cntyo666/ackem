<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ackem</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 38%, rgba(196, 168, 112, 0.12), transparent 55%),
          #0f0d14;
        color: #e8e0d0;
        font-family: system-ui, 'Segoe UI', sans-serif;
      }

      .panel {
        display: flex;
        height: 100%;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: 1.5rem;
        box-sizing: border-box;
      }

      .orb {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background:
          radial-gradient(circle at 35% 32%, rgba(255, 240, 210, 0.95), rgba(196, 168, 112, 0.55) 42%, rgba(80, 60, 120, 0.35) 72%, rgba(15, 13, 20, 0.2) 100%);
        box-shadow:
          0 0 48px rgba(196, 168, 112, 0.35),
          0 0 96px rgba(120, 90, 180, 0.18);
        animation: orb-pulse 2.8s ease-in-out infinite;
      }

      @keyframes orb-pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.04);
          opacity: 0.92;
        }
      }

      h1 {
        margin: 0;
        font-size: 1.35rem;
        font-weight: 600;
        letter-spacing: 0.12em;
      }

      .progress-wrap {
        width: min(15rem, 72vw);
        margin-top: 0.35rem;
      }

      .progress {
        height: 5px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 12px rgba(196, 168, 112, 0.15);
      }

      .progress > span {
        display: block;
        height: 100%;
        width: 0%;
        border-radius: inherit;
        background: linear-gradient(90deg, rgba(196, 168, 112, 0.85), rgba(230, 210, 160, 0.95));
        transition: width 420ms ease-out;
      }

      .status {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        margin: 0.55rem 0 0;
        min-height: 1.125rem;
        font-size: 0.75rem;
        color: #a8a0b0;
        letter-spacing: 0.03em;
      }

      .pct {
        font-variant-numeric: tabular-nums;
        color: #c4a870;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="orb" aria-hidden="true"></div>
      <h1>Ackem</h1>
      <div class="progress-wrap">
        <div class="progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="姝ｅ湪鍚姩">
          <span id="bar"></span>
        </div>
        <p class="status">
          <span id="status">姝ｅ湪鍚姩鈥?/span>
          <span class="pct" id="pct">0%</span>
        </p>
      </div>
    </div>
    <script>
      ;(function () {
        var lang = (navigator.language || '').toLowerCase()
        var statusEl = document.getElementById('status')
        if (statusEl) {
          statusEl.textContent = lang.startsWith('en') ? 'Starting鈥? : '姝ｅ湪鍚姩鈥?
        }

        function easeOut(t) {
          var x = Math.min(1, Math.max(0, t))
          return 1 - Math.pow(1 - x, 2.35)
        }

        var duration = 3000 + Math.floor(Math.random() * 2001)
        var start = performance.now()
        var bar = document.getElementById('bar')
        var pct = document.getElementById('pct')
        var progress = document.querySelector('.progress')

        function tick() {
          var elapsed = performance.now() - start
          var t = Math.min(1, elapsed / duration)
          var value = Math.round(easeOut(t) * 100)
          if (bar) bar.style.width = value + '%'
          if (pct) pct.textContent = value + '%'
          if (progress) progress.setAttribute('aria-valuenow', String(value))
          if (t < 1) requestAnimationFrame(tick)
        }

        requestAnimationFrame(tick)
      })()
    </script>
  </body>
</html>
