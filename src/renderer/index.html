<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ackem</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0f0d14;
      }

      #root {
        height: 100%;
        overflow: hidden;
      }

      #Ackem-boot-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #0f0d14;
        transition: opacity 0.42s ease, visibility 0.42s ease;
      }

      #Ackem-boot-splash.Ackem-boot-splash--out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #root {
        min-height: 100%;
        background: #0f0d14;
      }

      html.Ackem-booting body {
        background: #0f0d14 !important;
      }
    </style>
  </head>
  <body class="bg-surface text-ink antialiased">
    <div id="Ackem-boot-splash" aria-live="polite" aria-busy="true"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
