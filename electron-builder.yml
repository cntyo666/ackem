# Ackem Windows 鍙戣閰嶇疆锛圵3锛?
# 闅愮锛氱粷涓嶆墦鍖?data/ 路 .env 路 鐢ㄦ埛 settings锛堣 docs/distribution-windows.md锛?

appId: com.ackem.desktop
productName: Ackem
copyright: Copyright 漏 2026 Ackem contributors

# 鐗堟湰涓?package.json 瀵归綈锛堝彂琛?v1.0.0锛?
extraMetadata:
  version: 1.0.0

directories:
  output: dist
  buildResources: build

asar: true

# 鍙戣鍖呬綋绉ぇ锛堝惈 embedding + 璇煶锛夛紝鐢?store 閬垮厤 7z 楂樺帇缂╁崰婊″唴瀛?
compression: store

# 浠呯▼搴忎笌鐢熶骇渚濊禆锛沝ata/ 鍦?.gitignore 涓斾笉鍦ㄦ娓呭崟
files:
  - out/**/*
  - package.json
  - "!data/**"
  - "!**/.env"
  - "!**/.env.*"
  - "!**/*.log"
  - "!**/src/**"
  - "!**/*.map"

extraFiles:
  - from: scripts/uninstall.bat
    to: Uninstall Ackem.bat

extraResources:
  - from: scripts/uninstall.bat
    to: uninstall.bat
  # 璇煶鏈嶅姟锛堝惈鍐呯疆 gpt-sovits-runtime/銆乵odels/gpt-sovits/ 瑙掕壊璇煶鍖咃紱瑙?voice-service/models/gpt-sovits/BUNDLED.md锛?
  - from: voice-service
    to: voice-service
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
      - "!**/*.zip"
  # 妯″瀷 zip 蹇呴』钀藉湪 {exe}/resources/models/锛屼笌 modelManager 涓€鑷?
  - from: resources/models
    to: models
    filter:
      - "**/*"
  # 鍥炬爣绛夐潤鎬佽祫婧愶紙涓嶅惈 models锛岄伩鍏嶉噸澶嶅祵濂?resources/resources/锛?
  - from: resources
    to: resources
    filter:
      - "**/*"
      - "!models/**"
  # 寰俊 curated 璐寸焊 manifest锛圥NG 鍙寜 preset 鍚庣画琛ュ叏锛?
  - from: assets/weixin-stickers
    to: assets/weixin-stickers
    filter:
      - "**/*"
  # 寮€鍙戣€呮墿灞曟帴鍙ｅ崗璁紙缁胯壊鐗?docs/developer/锛?
  - from: docs/developer
    to: docs/developer
    filter:
      - "**/*"

win:
  icon: build/icon.ico
  # 璺宠繃 winCodeSign/rcedit锛堟棤绠＄悊鍛?symlink 鏉冮檺鏃朵細鎵撳寘澶辫触锛夛紱鍥炬爣鐢?scripts/patch-exe-icon.mjs 鍐欏叆
  signAndEditExecutable: false
  target:
    - target: dir
      arch:
        - x64
  artifactName: ${productName}-${version}-${arch}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: Ackem
  artifactName: ${productName}-${version}-Setup-${arch}.exe
  deleteAppDataOnUninstall: false
